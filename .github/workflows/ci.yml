name: Keira Kernel CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc xorriso mtools dosfstools grub-common grub-pc-bin

      - name: Install Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Build Keira Kernel
        run: make

      - name: Upload Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keira-bootable-iso
          path: build/keira-*.iso

      - name: Publish Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/keira-*.iso
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
